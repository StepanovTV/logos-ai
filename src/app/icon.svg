<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="100%" height="100%">
  <defs>
    <linearGradient id="g-bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbfcff" />
      <stop offset="100%" stop-color="#00dbe9" />
    </linearGradient>
    <linearGradient id="g-bm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00dbe9" />
      <stop offset="100%" stop-color="#006970" />
    </linearGradient>
    <linearGradient id="g-pm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e9b3ff" />
      <stop offset="100%" stop-color="#7d01b1" />
    </linearGradient>
    <linearGradient id="g-pd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7d01b1" />
      <stop offset="100%" stop-color="#310048" />
    </linearGradient>
    <linearGradient id="g-m1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00dbe9" />
      <stop offset="100%" stop-color="#7d01b1" />
    </linearGradient>
    <linearGradient id="g-dk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#353438" />
      <stop offset="100%" stop-color="#0e0e11" />
    </linearGradient>
    <filter id="n-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
