      <line x1="55" y1="10" x2="65" y2="-5" />
      <line x1="90" y1="30" x2="110" y2="20" />
      <line x1="95" y1="70" x2="115" y2="85" />
      <line x1="10" y1="50" x2="-5" y2="40" />
      <line x1="65" y1="100" x2="70" y2="115" />
    </g>

    <g stroke-width="1" stroke-linejoin="round" opacity="0.9">
      <polygon points="65,100 25,85 65,65" fill="url(#g-dk)" stroke="#353438" />
      <polygon points="25,85 10,50 45,40" fill="url(#g-bm)" stroke="#006970" />
      <polygon points="10,50 25,20 45,40" fill="url(#g-bb)" stroke="#00dbe9" />
      <polygon points="95,70 65,100 65,65" fill="url(#g-pd)" stroke="#7d01b1" />
      <polygon points="45,40 65,65 25,85" fill="url(#g-dk)" stroke="#3b494b" />
      <polygon points="25,20 55,10 45,40" fill="url(#g-bb)" stroke="#dbfcff" />
